# Configuración solo para los tests: BD en memoria (H2) para que el
# contexto de Spring arranque sin un Postgres real. Redis usa Lettuce,
# que conecta de forma perezosa, por lo que no bloquea el arranque.
spring:
  # Perfil 'test' activo: cablea ArbitroStockEnMemoria (doble in-memory con la
  # misma semántica atómica) en vez de ArbitroStockRedis, para no depender de un
  # Redis real (Testcontainers no es viable dentro del contenedor de build).
  profiles:
    active: test
  datasource:
    url: jdbc:h2:mem:vivevinyls;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      # En test, Hibernate genera el esquema desde las entidades y lo descarta
      # al terminar (BD H2 en memoria, efímera por ejecución).
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  data:
    redis:
      host: localhost
      port: 6379

# CORS: en test basta un origen cualquiera; CorsConfig exige esta propiedad
# (sin default) desde la fase 3.5. Espeja el valor por defecto del perfil dev.
app:
  cors:
    allowed-origins: http://localhost:5173
  # JWT para los tests de auth (Fase 4): secreto fijo (>=32 bytes) para que el
  # encoder y el decoder compartan clave; SecurityConfig lo exige sin default.
  jwt:
    secret: test-secret-vivevinyls-0123456789-abcdefghij
    issuer: vivevinyls-test
    expiracion-segundos: 3600
