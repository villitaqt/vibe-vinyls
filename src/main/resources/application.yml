spring:
  application:
    name: vivevinyls

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/vivevinyls}
    username: ${POSTGRES_USER:vivevinyls}
    password: ${POSTGRES_PASSWORD:vivevinyls}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Perfil de desarrollo: Hibernate crea y ajusta el esquema desde las
      # entidades (sin Flyway ni otra herramienta de migración).
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}

# CORS para el dev server de Vite (frontend de catálogo). Lista parametrizable
# por variable de entorno; NO se usa "*". Consumido por CorsConfig.
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  # JWT del auth local (HS256). Temporal hasta Cognito: el mismo secreto firma y
  # valida. El secreto debe tener >=32 bytes (256 bits) para HS256; en producción
  # se inyecta por variable de entorno (nunca el default de dev).
  jwt:
    secret: ${JWT_SECRET:dev-secret-vivevinyls-cambiar-en-produccion-0123456789}
    issuer: ${JWT_ISSUER:vivevinyls}
    expiracion-segundos: ${JWT_EXP_SEGUNDOS:3600}
  # Compra (Fase 5b): ventana de reserva. Pasada, el job de expiración cancela el
  # pedido PENDIENTE_PAGO y libera el stock. 'expiracion-check-ms' es el intervalo
  # del scheduler (no aplica en test: la planificación está desactivada ahí).
  pedido:
    reserva-ttl-seconds: ${RESERVA_TTL_SECONDS:900}
    expiracion-check-ms: ${EXPIRACION_CHECK_MS:60000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
