spring:
  application:
    name: vivevinyls

  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/vivevinyls}
    username: ${POSTGRES_USER:vivevinyls}
    password: ${POSTGRES_PASSWORD:vivevinyls}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
